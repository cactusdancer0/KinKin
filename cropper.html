<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PNG Asset Multi-Cropper</title>
<style>
    body { font-family: Arial; background: #120824; color: white; text-align: center; padding: 20px; }
    #gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
    canvas { border: 2px solid #ff2a6d; background: #222; max-width: 200px; }
</style>
</head>
<body>

<h1>PNG Asset Multi-Cropper</h1>
<input type="file" id="upload" accept="image/*" multiple>
<div id="gallery"></div>

<script>
document.getElementById("upload").addEventListener("change", function(e) {
    const files = e.target.files;
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = ""; // Limpiar galería previa

    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                processAndDownload(img, file.name);
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });
});

function processAndDownload(img, originalName) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    let top = canvas.height, left = canvas.width, right = 0, bottom = 0;

    for (let y = 0; y < canvas.height; y++) {
        for (let x = 0; x < canvas.width; x++) {
            if (data[(y * canvas.width + x) * 4 + 3] > 0) {
                if (x < left) left = x;
                if (x > right) right = x;
                if (y < top) top = y;
                if (y > bottom) bottom = y;
            }
        }
    }

    const cropW = right - left + 1;
    const cropH = bottom - top + 1;

    const finalCanvas = document.createElement("canvas");
    finalCanvas.width = cropW;
    finalCanvas.height = cropH;
    finalCanvas.getContext("2d").drawImage(canvas, left, top, cropW, cropH, 0, 0, cropW, cropH);

    // Mostrar en galería
    document.getElementById("gallery").appendChild(finalCanvas);

    // Descarga automática
    const link = document.createElement("a");
    link.download = "cropped_" + originalName;
    link.href = finalCanvas.toDataURL("image/png");
    link.click();
}
</script>
</body>
</html>
